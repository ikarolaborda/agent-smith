run:
  timeout: 5m
  go: '1.23'

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
