run:
  timeout: 5m
  go: '1.24'

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
        arguments:
          # Keep doc-comment enforcement on exported symbols, but don't fight
          # descriptive cluster.Cluster* names with the stutter sub-check —
          # cluster.Manager already exists, so a clean de-stutter rename isn't
          # possible without colliding the interface with the struct.
          - disableStutteringCheck
      - name: package-comments
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
