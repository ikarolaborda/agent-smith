# Default CODING config for the agent's own llama.cpp provider (Go supervisor of
# llama-server). Downloads the GGUF from Hugging Face itself, then serves it on
# loopback. Model: huihui-ai abliterated Qwen3-Coder-30B-A3B — a Mixture-of-
# Experts coder (30B total, ~3.3B active/token) purpose-built for agentic coding.
# MoE is why it runs well here: only the active experts compute per token, so
# partial CPU offload of a model larger than VRAM stays fast.
#
# This is the app's chosen default abliterated coding model. Because it is MoE it
# is deliberately absent from the offline fit ladder in
# internal/llm/llamacpp/catalog.go (the dense params->bytes estimate does not
# apply); the fit gate still re-checks the real ~18.6 GiB artifact at pull time.
#
# Requires `llama-server` on PATH (a Vulkan or ROCm build for GPU offload on AMD).
# Assess before downloading with:
#   ./bin/agent --inspect-model hf.co/mradermacher/Huihui-Qwen3-Coder-30B-A3B-Instruct-abliterated-i1-GGUF:Q4_K_M
# Run with:
#   ./bin/agent --serve --config configs/qwen3-coder-abliterated.yaml
default_provider: llamacpp

agent:
  system_prompt: "You are a Senior Software Engineer with 20 years of experience. You write concise, correct, idiomatic code and follow best practices."
  max_iterations: 10

providers:
  llamacpp:
    model: qwen3-coder-30b-abliterated
    llama_cpp:
      repo: mradermacher/Huihui-Qwen3-Coder-30B-A3B-Instruct-abliterated-i1-GGUF
      file: Huihui-Qwen3-Coder-30B-A3B-Instruct-abliterated.i1-Q4_K_M.gguf
      quant: Q4_K_M              # consistency assertion: must match the pinned file
      revision: main
      binary: llama-server
      # gpu_layers and ctx_size are intentionally UNSET: with both omitted the
      # provider auto-tunes for the detected GPU/VRAM (see cmd/agent/provider.go
      # autoTuneLlama) and picks the partial-offload layer count + a safe context.
      # Set them explicitly only to override that decision.
      parallel: 1
      jinja: true                # use the model's own chat template for tool calls
      # Pin the discrete GPU so the auto-tuner's VRAM math (16 GB RX 7800 XT) holds
      # and layers don't spill onto the slower Ryzen iGPU (Vulkan1). Drop this line
      # on a single-GPU host.
      extra_args: ["--device", "Vulkan0"]
      startup_timeout_seconds: 300
