name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Reads the version pinned in go.mod — keeps CI and module in lock-step.
          go-version-file: go.mod
          cache: true

      - name: npm ci (web)
        working-directory: web
        run: npm ci

      - name: Build web/dist
        working-directory: web
        run: npm run build

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o bin/agent ./cmd/agent

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
